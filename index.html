<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Interactivo</title>
    <link rel="stylesheet" href="index.css">
    <script defer src="script.js"></script>
    <!-- Particles.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
</head>
<body>
    <!-- Fondo de luciérnagas -->
    <div id="particles-js"></div>

    <div class="login-container">
        <h2>Iniciar Sesión</h2>
        <form id="login-form">
            <div class="input-group">
                <input type="text" id="login-username" placeholder="Usuario" required>
            </div>
            <div class="input-group">
                <input type="password" id="login-password" placeholder="Contraseña" required>
            </div>
            <button class="btn" type="submit">Entrar</button>
            <!-- Enlace para recuperar contraseña con funcionalidad integrada -->
            <p class="forgot-password"><a href="#" onclick="recoverPassword()">¿Olvidaste tu contraseña?</a></p>
            <p class="signup-text">¿No tienes una cuenta? <a href="registrate.html">Regístrate</a></p>
        </form>
        <p id="error-message" class="error-message"></p>
    </div>

    <!-- Configuración de particles.js para luciérnagas -->
    <script>
        particlesJS('particles-js', {
            particles: {
                number: { value: 50, density: { enable: true, value_area: 800 } },
                color: { value: "#ffffff" },
                shape: { type: "circle", stroke: { width: 0, color: "#000000" } },
                opacity: { value: 0.8, random: true, anim: { enable: true, speed: 1, opacity_min: 0.2, sync: false } },
                size: { value: 5, random: true, anim: { enable: true, speed: 5, size_min: 1, sync: false } },
                line_linked: { enable: false },
                move: { enable: true, speed: 1, random: true, out_mode: "out" }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: true, mode: "repulse" },
                    onclick: { enable: true, mode: "push" }
                },
                modes: { repulse: { distance: 100, duration: 0.4 }, push: { particles_nb: 2 } }
            },
            retina_detect: true
        });

        // Función de recuperación de contraseña
        function recoverPassword() {
            let username = prompt("Ingrese su nombre de usuario:");

            if (!username) {
                alert("Debes ingresar un usuario.");
                return;
            }

            let users = JSON.parse(localStorage.getItem('users')) || [];
            let userIndex = users.findIndex(user => user.username === username);

            if (userIndex !== -1) {
                let newPassword = prompt("Ingrese su nueva contraseña:");
                if (newPassword) {
                    users[userIndex].password = newPassword;
                    localStorage.setItem('users', JSON.stringify(users));
                    alert("Contraseña restablecida con éxito. Ahora puedes iniciar sesión.");
                } else {
                    alert("No ingresaste una nueva contraseña.");
                }
            } else {
                alert("El usuario no existe.");
            }
        }
    </script>
</body>
</html>
